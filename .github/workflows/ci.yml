# CI: fmt / clippy / test。GitHub-hosted runner で実行し secret を一切使わない。
# pull_request (fork 含む) でも安全に回せる (untrusted コードはセルフホスト Runner に載せない)。
# DB 無しでビルドするため SQLX_OFFLINE=true + コミット済み sqlx-data.json を使う (TASK-002)。
name: ci

on:
  push:
    branches: [master, dev]
  pull_request:

# 同一 ref の古い実行はキャンセルして無駄なビルドを避ける。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 既定権限を最小化 (このワークフローは読み取りだけでよい)。
permissions:
  contents: read

env:
  SQLX_OFFLINE: "true"
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Dockerfile の builder (rust:1.96-bookworm) と同じ toolchain に固定して
      # CI と本番ビルドの lint/型結果を一致させる。
      - name: Install Rust toolchain (1.96.0)
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-targets --all-features
