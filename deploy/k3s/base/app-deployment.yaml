# qkjudge アプリ (ghcr.io/kisepichu/qkjudge)。image tag は overlay の images: で差す。
# env: 非 secret は qkjudge-config (configMap)、secret は qkjudge-secrets から envFrom で注入。
#   - qkjudge-secrets は MARIADB_ROOT_PASSWORD も含むが、アプリは未使用なので注入されても無害。
# problems: emptyDir。entrypoint (docker-entrypoint.sh) が起動時に dist を shallow clone し、
#   実行時は POST /fetch/problems で pull する。中身は git から完全再現できるので永続化しない。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qkjudge-app
  labels:
    app: qkjudge-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qkjudge-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: qkjudge-app
    spec:
      containers:
        - name: qkjudge
          image: ghcr.io/kisepichu/qkjudge:latest
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: qkjudge-config
            - secretRef:
                name: qkjudge-secrets
          volumeMounts:
            - name: problems
              mountPath: /data/problems
          readinessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: problems
          emptyDir: {}
