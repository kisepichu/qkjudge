# qkjudge アプリ (ghcr.io/kisepichu/qkjudge)。image tag は overlay の images: で差す。
# env: 非 secret は qkjudge-config (configMap) を envFrom で、secret はアプリが必要なキーだけ
#   secretKeyRef で個別に注入する (最小権限。qkjudge-secrets 全体を envFrom すると未使用の
#   MARIADB_ROOT_PASSWORD まで持ってしまうため避ける)。
# problems: emptyDir。entrypoint (docker-entrypoint.sh) が起動時に dist を shallow clone し、
#   実行時は POST /fetch/problems で pull する。中身は git から完全再現できるので永続化しない。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qkjudge-app
  labels:
    app: qkjudge-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qkjudge-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: qkjudge-app
    spec:
      containers:
        - name: qkjudge
          image: ghcr.io/kisepichu/qkjudge:latest
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: qkjudge-config
          env:
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qkjudge-secrets
                  key: MARIADB_PASSWORD
            - name: SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: qkjudge-secrets
                  key: SESSION_KEY
            - name: GITHUB_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: qkjudge-secrets
                  key: GITHUB_WEBHOOK_TOKEN
            - name: COMPILER_API_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: qkjudge-secrets
                  key: COMPILER_API_CLIENT_ID
            - name: COMPILER_API_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qkjudge-secrets
                  key: COMPILER_API_CLIENT_SECRET
          volumeMounts:
            - name: problems
              mountPath: /data/problems
          readinessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: problems
          emptyDir: {}
