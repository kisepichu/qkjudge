apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# prod 環境。master ブランチ相当の image を api.qkjudge.kisen.one で公開する。
namespace: qkjudge-prod

resources:
  - namespace.yaml
  - ../../base

# CORS は Allow-Credentials 併用のため単一オリジンのみ (フロントの本番 URL)。
configMapGenerator:
  - name: qkjudge-config
    behavior: merge
    literals:
      - CORS_ALLOW_ORIGIN=https://qkjudge.kisen.one

images:
  - name: ghcr.io/kisepichu/qkjudge
    newTag: master

patches:
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: qkjudge
