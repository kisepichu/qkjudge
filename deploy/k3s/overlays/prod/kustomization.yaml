apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# prod 環境。master ブランチ相当の image を qkjudge-api.kisen.one で公開する。
namespace: qkjudge-prod

resources:
  - namespace.yaml
  - ../../base

# CORS は Allow-Credentials 併用のため単一オリジンのみ (フロントの本番 URL)。
configMapGenerator:
  - name: qkjudge-config
    behavior: merge
    literals:
      - CORS_ALLOW_ORIGIN=https://qkjudge.kisen.one

images:
  - name: ghcr.io/kisepichu/qkjudge
    newTag: master

# host だけを JSON6902 で確実に差し替える (rules リスト全体の置換/追加の曖昧さを避ける)。
patches:
  - target:
      kind: Ingress
      name: qkjudge
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: qkjudge-api.kisen.one
