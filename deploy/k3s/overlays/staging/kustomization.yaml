apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# staging 環境。dev ブランチ相当の image を qkjudge-api-stg.kisen.one で公開する。
# prod との差分は namespace / image tag / Ingress host / CORS origin のみ
# (DB は別 namespace の StatefulSet なので独立。DB 名は共通でよい)。
namespace: qkjudge-staging

resources:
  - namespace.yaml
  - ../../base

configMapGenerator:
  - name: qkjudge-config
    behavior: merge
    literals:
      - CORS_ALLOW_ORIGIN=https://qkjudge-stg.kisen.one

images:
  - name: ghcr.io/kisepichu/qkjudge
    newTag: dev

# host だけを JSON6902 で確実に差し替える (rules リスト全体の置換/追加の曖昧さを避ける)。
patches:
  - target:
      kind: Ingress
      name: qkjudge
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: qkjudge-api-stg.kisen.one
